name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install xcodegen
        run: brew install xcodegen

      # Write Steno.xcconfig from repo secrets so the built app has the
      # PostHog + Sentry keys plumbed into Info.plist. The keys are
      # public-by-design SDK keys (see docs/adr/0009). If a secret is
      # missing, the key falls back to empty and the SDK init no-ops.
      #
      # xcconfig's `//` comment parser truncates URLs containing `//`,
      # so the Sentry DSN's `https://` needs `$()` inserted to break the
      # comment match. Earlier attempts used a bash parameter expansion
      # for this — that introduced literal `\\/` backslash-slashes into
      # the final value (v0.2.18 build #44 shipped a broken DSN). Python's
      # `str.replace` is unambiguous and avoids the escape confusion.
      - name: Write Steno.xcconfig
        env:
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        run: |
          python3 - << 'PYEOF'
          import os
          posthog = os.environ.get("POSTHOG_API_KEY", "")
          sentry = os.environ.get("SENTRY_DSN", "").replace("//", "/$()/")
          with open("Steno.xcconfig", "w") as f:
              f.write(f"POSTHOG_API_KEY = {posthog}\n")
              f.write(f"SENTRY_DSN = {sentry}\n")
          PYEOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve packages
        run: |
          xcodebuild -project Steno.xcodeproj \
            -scheme Steno \
            -resolvePackageDependencies

      - name: Build
        run: |
          xcodebuild -project Steno.xcodeproj \
            -scheme Steno \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            ARCHS=arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Import certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Set keychain search list
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Get signing identity
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | grep -o '".*"' | tr -d '"')
          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Sign app
        # IMPORTANT: --entitlements is required. Hardened runtime (--options runtime)
        # strips all permissions without it. Missing this broke v0.2.0–v0.2.2:
        # macOS silently denied microphone access, no error, no prompt.
        run: |
          codesign --force --options runtime \
            --entitlements Steno/Steno.entitlements \
            --sign "${{ env.SIGNING_IDENTITY }}" \
            --keychain "${{ env.KEYCHAIN_PATH }}" \
            --deep \
            "build/Build/Products/Release/Steno.app"

          # Verify
          codesign --verify --deep --strict "build/Build/Products/Release/Steno.app"
          echo "Signing verified"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Steno.app"
          DMG_NAME="Steno-${GITHUB_REF_NAME}.dmg"

          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          hdiutil create -volname "Steno" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          # Sign the DMG too
          codesign --force --sign "${{ env.SIGNING_IDENTITY }}" \
            --keychain "${{ env.KEYCHAIN_PATH }}" \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Write API key
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: echo "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"

      - name: Notarize
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit "${{ env.DMG_NAME }}" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait --timeout 30m

          xcrun stapler staple "${{ env.DMG_NAME }}"

          echo "DMG_SHA256=$(shasum -a 256 ${{ env.DMG_NAME }} | cut -d ' ' -f 1)" >> $GITHUB_ENV

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          body: |
            ## Install

            ```bash
            brew tap kmg/steno
            brew install --cask steno
            ```

            Or download the DMG, drag Steno to Applications.

            **SHA256:** `${{ env.DMG_SHA256 }}`
          draft: false
          prerelease: false
